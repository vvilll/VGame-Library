<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double:wght@100..900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"></script>
<body>
    <div class="header">
        <div class="headerLogo">
            <a href="index.html">
                <img src="images/labLogo.png" alt="dev" width="150" height="150">
            </a>
        </div>
        <div class="headerNav">
            <nav class="navBar">
                <ul>
                    <li><a href="content.html" style="color: rgb(247, 233, 70);">Library</a></li>
                    <li><a href="about.html" style="color: rgb(247, 233, 70);">About Us</a></li>
                    <li><a href="login.html" style="color: rgb(247, 233, 70);">Login</a></li>
                    <li><a href="signup.html" style="color: rgb(247, 233, 70);">Signup</a></li>
                </ul>
            </nav>
        </div>
        <div class="usrIcon">
            <a href="account.html"><img src="images/icon.png" alt="dev" width="100px" height="100px"></a>
        </div>
    </div>
    <div class="d-flex align-items-center justify-content-center">
        <form class="w-50 ">
            <div class="row mb-4 p-2 border-bottom">
                <div class="col-lg-11">
                    <h3 class="text-danger">Signup Form</h3>
                    <p class="text-muted mb-0">Fill in the information below and click submit.</p>
                </div>
            </div>

            <div class="row mb-1">
                <div class="col-lg-12">
                    <label class="text-muted" for="email">Username</label><br>
                    <input class="form-control" id="txtBox" type="text" id="username" name="username"/>
                </div>
            </div>

            <div class="row mb-1">
                <div class="col-lg-12">
                    <label class="text-muted" for="email">E-mail</label><br>
                    <input class="form-control" id="txtBox" type="text" id="email" name="email" placeholder="name@example.com"/>
                </div>
            </div>

            <div class="row mb-1">
                <div class="col-lg-12">
                    <label class="text-muted" for="email">Password</label><br>
                    <input class="form-control" id="txtBox" type="password" id="password" name="password"/>
                </div>
            </div>

            <div class="row mb-1">
                <div class="col-lg-12">
                    <label class="text-muted" for="email">Confirm Password</label><br>
                    <input class="form-control" id="txtBox" type="password" id="password" name="password"/>
                </div>
            </div>

            <div class="row mb-1">
                <div class="col-lg-12">
                    <label class="text-muted" for="mobile">Mobile</label><br>
                    <input class="form-control" id="txtBox" type="text" id="mobile" name="mobile" required pattern="[0-9]+" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="+91..."/>
                </div>
            </div>

            <div class="row mb-1">
                <div class="col-lg-9"></div>
                <div class="col-lg-3 d-flex justify-content-end">
                    <input class="ms-2 rounded bg-light text-dark" type="reset" id="reset" value="Reset">
                    <input class="ms-2 rounded text-white bg-dark" type="submit" id="submit" value="Submit">
                </div>
            </div>
        </form>
    </div>
</body>
</html>
